<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>分單計數機</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --line: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #0f766e;
      --danger: #dc2626;
      --shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 20px 16px 48px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      margin-bottom: 16px;
      padding: 14px;
      background: rgba(246, 247, 251, 0.92);
      backdrop-filter: blur(10px);
    }

    .topbar-inner {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      box-shadow: var(--shadow);
    }

    .group-input {
      flex: 1 1 280px;
      min-width: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
    }

    .card {
      grid-column: span 12;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: var(--shadow);
      transition: background-color 0.2s ease;
    }

    .card.edit-mode {
      background: #ffe6e6;
    }

    .span-6 {
      grid-column: span 12;
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 1rem;
      font-weight: 700;
    }

    .section-subtitle {
      margin: -4px 0 14px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      background: #fbfcfe;
    }

    .stat small {
      display: block;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat strong {
      display: block;
      font-size: 1.4rem;
      letter-spacing: 0.02em;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--muted);
    }

    input,
    select {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      font-size: 1rem;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-secondary {
      background: #eff6ff;
      color: var(--primary);
    }

    .btn-light {
      background: #f3f4f6;
      color: var(--text);
    }

    .btn-warning {
      background: #fff7ed;
      color: #b45309;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .status {
      min-height: 24px;
      margin-top: 12px;
      font-size: 0.92rem;
      font-weight: 600;
    }

    .status.success {
      color: var(--success);
    }

    .status.error {
      color: var(--danger);
    }

    .quiet {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .empty {
      padding: 20px;
      border: 1px dashed var(--line);
      border-radius: 14px;
      background: #fcfcfd;
      color: var(--muted);
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
    }

    td.number {
      font-variant-numeric: tabular-nums;
    }

    .settlement-positive {
      color: var(--success);
      font-weight: 700;
    }

    .settlement-negative {
      color: var(--danger);
      font-weight: 700;
    }

    .settlement-zero {
      color: var(--muted);
      font-weight: 700;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .current-group {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .print-area {
      display: flex;
      justify-content: flex-end;
      margin-top: 16px;
    }

    @media (min-width: 900px) {
      .span-6 {
        grid-column: span 6;
      }
    }

    @media print {
      .no-print {
        display: none !important;
      }

      body {
        background: #fff;
      }

      .topbar {
        position: static;
        padding: 0;
      }

      .topbar-inner,
      .card {
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar no-print">
      <form id="groupForm" class="topbar-inner">
        <div class="group-input">
          <label for="groupInput">群組名稱</label>
          <input id="groupInput" type="text" placeholder="輸入群組後按 Enter 或點擊進入" />
        </div>
        <div class="group-input">
          <label for="groupSelect">快速切換</label>
          <select id="groupSelect">
            <option value="">選擇已存在的群組</option>
          </select>
        </div>
        <button type="submit" class="btn-primary">進入</button>
        <button type="button" class="btn-secondary" id="copyUrlBtn">複製目前網址</button>
        <button type="button" class="btn-light" id="resetBtn">清除 / 重置</button>
      </form>
    </div>

    <div class="grid">
      <section class="card">
        <div class="toolbar">
          <div class="current-group" id="currentGroupLabel">未選擇群組</div>
          <div class="quiet" id="groupHint">輸入群組名稱後即可進入。</div>
        </div>

        <div class="stats">
          <div class="stat">
            <small>總金額</small>
            <strong id="totalAmount">0.00</strong>
          </div>
          <div class="stat">
            <small>總人數</small>
            <strong id="totalWeight">0.00</strong>
          </div>
          <div class="stat">
            <small>每單位</small>
            <strong id="unitAmount">0.00</strong>
          </div>
        </div>

        <div id="memberSummary"></div>

        <div class="print-area no-print">
          <button type="button" class="btn-light" id="printBtn">導出 PDF</button>
        </div>
      </section>

      <section class="card span-6 no-print" id="billCard">
        <h2 class="section-title" id="billFormTitle">新增預支</h2>
        <p class="section-subtitle">每一筆都代表某人先墊付的一筆費用。</p>
        <form id="billForm">
          <input type="hidden" id="billId" />
          <div class="form-grid">
            <div>
              <label for="itemName">項目</label>
              <input id="itemName" type="text" placeholder="晚餐、飲料、交通" required />
            </div>
            <div>
              <label for="amount">金額</label>
              <input id="amount" type="number" min="0" step="0.01" placeholder="0.00" required />
            </div>
            <div>
              <label for="payer">預支人</label>
              <input id="payer" type="text" placeholder="小明" required />
            </div>
            <div>
              <label for="billWeight">人數</label>
              <input id="billWeight" type="number" min="0.01" step="0.01" value="1" required />
            </div>
          </div>
          <div class="actions">
            <button type="submit" class="btn-primary" id="billSubmitBtn">儲存</button>
            <button type="button" class="btn-light" id="billCancelBtn">清空</button>
          </div>
          <div id="billStatus" class="status"></div>
        </form>
      </section>

      <section class="card span-6 no-print">
        <h2 class="section-title" id="memberFormTitle">新增成員</h2>
        <p class="section-subtitle">沒有預支的人也能加入分帳。</p>
        <form id="memberForm">
          <input type="hidden" id="memberId" />
          <div class="form-grid">
            <div>
              <label for="memberName">姓名</label>
              <input id="memberName" type="text" placeholder="小明、小華、小孩" required />
            </div>
            <div>
              <label for="weight">人數</label>
              <input id="weight" type="number" min="0.01" step="0.01" value="1" required />
            </div>
          </div>
          <div class="actions">
            <button type="submit" class="btn-primary" id="memberSubmitBtn">儲存</button>
            <button type="button" class="btn-light" id="memberCancelBtn">清空</button>
          </div>
          <div id="memberStatus" class="status"></div>
        </form>
      </section>

      <section class="card">
        <h2 class="section-title">預支紀錄</h2>
        <div id="billList"></div>
      </section>

      <section class="card">
        <h2 class="section-title">成員</h2>
        <div id="memberList"></div>
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://zryatuqohbicnxcasqzl.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_SvaZt60lD68VdZaZbYbMFA_NpSO4Bgh";
    const BILLS_TABLE = "bills";
    const MEMBERS_TABLE = "members";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const groupForm = document.getElementById("groupForm");
    const groupInput = document.getElementById("groupInput");
    const groupSelect = document.getElementById("groupSelect");
    const copyUrlBtn = document.getElementById("copyUrlBtn");
    const resetBtn = document.getElementById("resetBtn");
    const currentGroupLabel = document.getElementById("currentGroupLabel");
    const groupHint = document.getElementById("groupHint");

    const totalAmountEl = document.getElementById("totalAmount");
    const totalWeightEl = document.getElementById("totalWeight");
    const unitAmountEl = document.getElementById("unitAmount");
    const memberSummaryEl = document.getElementById("memberSummary");
    const billListEl = document.getElementById("billList");
    const memberListEl = document.getElementById("memberList");
    const printBtn = document.getElementById("printBtn");

    const billForm = document.getElementById("billForm");
    const billCard = document.getElementById("billCard");
    const billIdInput = document.getElementById("billId");
    const itemNameInput = document.getElementById("itemName");
    const amountInput = document.getElementById("amount");
    const payerInput = document.getElementById("payer");
    const billWeightInput = document.getElementById("billWeight");
    const billFormTitle = document.getElementById("billFormTitle");
    const billSubmitBtn = document.getElementById("billSubmitBtn");
    const billCancelBtn = document.getElementById("billCancelBtn");
    const billStatus = document.getElementById("billStatus");

    const memberForm = document.getElementById("memberForm");
    const memberIdInput = document.getElementById("memberId");
    const memberNameInput = document.getElementById("memberName");
    const weightInput = document.getElementById("weight");
    const memberFormTitle = document.getElementById("memberFormTitle");
    const memberSubmitBtn = document.getElementById("memberSubmitBtn");
    const memberCancelBtn = document.getElementById("memberCancelBtn");
    const memberStatus = document.getElementById("memberStatus");

    let currentGroupName = "";
    let currentBills = [];
    let currentMembers = [];

    function formatNumber(value) {
      const number = Number(value || 0);
      return Number.isFinite(number) ? number.toFixed(2) : "0.00";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function setStatus(element, message, type = "success") {
      element.textContent = message;
      element.className = "status " + type;
    }

    function clearStatus(element) {
      element.textContent = "";
      element.className = "status";
    }

    function getGroupNameFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return (params.get("group_name") || "").trim();
    }

    function buildGroupUrl(groupName) {
      const clean = groupName.trim();
      if (!clean) {
        return "index.html";
      }
      return `index.html?group_name=${encodeURIComponent(clean)}`;
    }

    function isPermissionError(error) {
      const message = String(error?.message || "").toLowerCase();
      const code = String(error?.code || "");
      return (
        code === "42501" ||
        message.includes("permission denied") ||
        message.includes("row-level security") ||
        message.includes("violates row-level security") ||
        message.includes("new row violates")
      );
    }

    function getErrorMessage(error, fallbackText) {
      if (!error) {
        return fallbackText;
      }

      if (isPermissionError(error)) {
        return `${fallbackText}：目前權限不足，請檢查 Supabase 的 RLS Policies 是否已允許目前的 select、insert 或 update。`;
      }

      return `${fallbackText}：${error.message || "發生未知錯誤"}`;
    }

    function updateGroupHeader(groupName) {
      currentGroupLabel.textContent = groupName || "未選擇群組";
      if (!groupName) {
        groupHint.textContent = "輸入群組名稱後即可進入。";
        return;
      }
      groupHint.textContent = "載入後會自動查詢，不需要再手動點擊。";
    }

    function setBillEditMode(enabled) {
      billCard.classList.toggle("edit-mode", Boolean(enabled));
    }

    function resetBillForm() {
      billIdInput.value = "";
      itemNameInput.value = "";
      amountInput.value = "";
      payerInput.value = "";
      billWeightInput.value = "1";
      billFormTitle.textContent = "新增預支";
      billSubmitBtn.textContent = "儲存";
      setBillEditMode(false);
      clearStatus(billStatus);
    }

    function resetMemberForm() {
      memberIdInput.value = "";
      memberNameInput.value = "";
      weightInput.value = "1";
      memberFormTitle.textContent = "新增成員";
      memberSubmitBtn.textContent = "儲存";
      clearStatus(memberStatus);
    }

    function renderWelcomeState() {
      totalAmountEl.textContent = "0.00";
      totalWeightEl.textContent = "0.00";
      unitAmountEl.textContent = "0.00";
      memberSummaryEl.innerHTML = '<div class="empty">輸入群組名稱並進入後，這裡會顯示每個人的已付、應付與結算。</div>';
      billListEl.innerHTML = '<div class="empty">尚未選擇群組。</div>';
      memberListEl.innerHTML = '<div class="empty">尚未選擇群組。</div>';
    }

    function renderSummary(bills, members) {
      const totalAmount = bills.reduce((sum, bill) => sum + Number(bill.amount || 0), 0);
      const totalWeight = members.reduce((sum, member) => sum + Number(member.weight || 0), 0);
      const unitAmount = totalWeight > 0 ? totalAmount / totalWeight : 0;
      const paidMap = new Map();

      for (const bill of bills) {
        const payerName = String(bill.payer || "").trim();
        if (!payerName) {
          continue;
        }
        paidMap.set(payerName, (paidMap.get(payerName) || 0) + Number(bill.amount || 0));
      }

      totalAmountEl.textContent = formatNumber(totalAmount);
      totalWeightEl.textContent = formatNumber(totalWeight);
      unitAmountEl.textContent = formatNumber(unitAmount);

      if (!currentGroupName) {
        memberSummaryEl.innerHTML = '<div class="empty">請先輸入群組名稱。</div>';
        return;
      }

      if (!members.length) {
        memberSummaryEl.innerHTML = '<div class="empty">這個群組目前沒有成員資料，先新增成員後就能計算。</div>';
        return;
      }

      const nameSet = new Set([
        ...members.map((member) => String(member.member_name || "").trim()).filter(Boolean),
        ...bills.map((bill) => String(bill.payer || "").trim()).filter(Boolean),
      ]);

      const memberMap = new Map(
        members.map((member) => [String(member.member_name || "").trim(), member])
      );

      const rows = [...nameSet]
        .sort((a, b) => a.localeCompare(b, "zh-Hant"))
        .map((name) => {
          const member = memberMap.get(name);
          const people = Number(member?.weight || 0);
          const paid = Number(paidMap.get(name) || 0);
          const shouldPay = unitAmount * people;
          const settlement = paid - shouldPay;

          let settlementText = `剛好 ${formatNumber(0)}`;
          let settlementClass = "settlement-zero";

          if (settlement > 0.000001) {
            settlementText = `可收回 ${formatNumber(settlement)}`;
            settlementClass = "settlement-positive";
          } else if (settlement < -0.000001) {
            settlementText = `需支付 ${formatNumber(Math.abs(settlement))}`;
            settlementClass = "settlement-negative";
          }

          return `
            <tr>
              <td>${escapeHtml(name)}</td>
              <td class="number">${formatNumber(people)}</td>
              <td class="number">${formatNumber(paid)}</td>
              <td class="number">${formatNumber(shouldPay)}</td>
              <td class="${settlementClass}">${settlementText}</td>
            </tr>
          `;
        })
        .join("");

      memberSummaryEl.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>姓名</th>
              <th>人數</th>
              <th>已付</th>
              <th>應付</th>
              <th>結算</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function renderBills(bills) {
      if (!currentGroupName) {
        billListEl.innerHTML = '<div class="empty">請先輸入群組名稱。</div>';
        return;
      }

      if (!bills.length) {
        billListEl.innerHTML = '<div class="empty">這個群組目前沒有預支資料。</div>';
        return;
      }

      const rows = bills
        .map((bill) => `
          <tr>
            <td>${escapeHtml(bill.item_name || "")}</td>
            <td>${escapeHtml(bill.payer || "")}</td>
            <td class="number">${formatNumber(bill.amount)}</td>
            <td class="number">${formatNumber(bill.weight)}</td>
            <td class="no-print">
              <button type="button" class="btn-warning" onclick="startBillEdit(${bill.id})">修改</button>
            </td>
          </tr>
        `)
        .join("");

      billListEl.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>項目</th>
              <th>預支人</th>
              <th>金額</th>
              <th>人數</th>
              <th class="no-print">操作</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function renderMembers(members) {
      if (!currentGroupName) {
        memberListEl.innerHTML = '<div class="empty">請先輸入群組名稱。</div>';
        return;
      }

      if (!members.length) {
        memberListEl.innerHTML = '<div class="empty">這個群組目前沒有成員資料。</div>';
        return;
      }

      const rows = members
        .map((member) => `
          <tr>
            <td>${escapeHtml(member.member_name || "")}</td>
            <td class="number">${formatNumber(member.weight)}</td>
            <td class="no-print">
              <button type="button" class="btn-warning" onclick="startMemberEdit(${member.id})">修改</button>
            </td>
          </tr>
        `)
        .join("");

      memberListEl.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>姓名</th>
              <th>人數</th>
              <th class="no-print">操作</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    async function loadGroupData(options = {}) {
      const { preserveBillStatus = false, preserveMemberStatus = false } = options;

      if (!currentGroupName) {
        renderWelcomeState();
        return;
      }

      updateGroupHeader(currentGroupName);
      groupInput.value = currentGroupName;

      const [billsResult, membersResult] = await Promise.all([
        supabaseClient
          .from(BILLS_TABLE)
          .select("*")
          .eq("group_name", currentGroupName)
          .order("created_at", { ascending: false }),
        supabaseClient
          .from(MEMBERS_TABLE)
          .select("*")
          .eq("group_name", currentGroupName)
          .order("created_at", { ascending: false }),
      ]);

      if (billsResult.error) {
        currentBills = [];
        setStatus(billStatus, getErrorMessage(billsResult.error, "讀取預支資料失敗"), "error");
      } else {
        currentBills = billsResult.data || [];
        if (!preserveBillStatus) {
          clearStatus(billStatus);
        }
      }

      if (membersResult.error) {
        currentMembers = [];
        setStatus(memberStatus, getErrorMessage(membersResult.error, "讀取成員資料失敗"), "error");
      } else {
        currentMembers = membersResult.data || [];
        if (!preserveMemberStatus) {
          clearStatus(memberStatus);
        }
      }

      renderSummary(currentBills, currentMembers);
      renderBills(currentBills);
      renderMembers(currentMembers);

      if (!currentBills.length && !currentMembers.length) {
        groupHint.textContent = "查詢完成，這個群組目前還沒有任何資料。";
      } else if (!billsResult.error && !membersResult.error) {
        groupHint.textContent = "資料已自動載入。";
      }
    }

    async function loadGroupOptions() {
      const [billsResult, membersResult] = await Promise.all([
        supabaseClient.from(BILLS_TABLE).select("group_name"),
        supabaseClient.from(MEMBERS_TABLE).select("group_name"),
      ]);

      const groups = new Set();

      if (Array.isArray(billsResult.data)) {
        billsResult.data.forEach((row) => {
          const name = String(row.group_name || "").trim();
          if (name) {
            groups.add(name);
          }
        });
      }

      if (Array.isArray(membersResult.data)) {
        membersResult.data.forEach((row) => {
          const name = String(row.group_name || "").trim();
          if (name) {
            groups.add(name);
          }
        });
      }

      const options = ['<option value="">選擇已存在的群組</option>'];
      [...groups]
        .sort((a, b) => a.localeCompare(b, "zh-Hant"))
        .forEach((groupName) => {
          const selected = groupName === currentGroupName ? " selected" : "";
          options.push(`<option value="${escapeHtml(groupName)}"${selected}>${escapeHtml(groupName)}</option>`);
        });

      groupSelect.innerHTML = options.join("");
    }

    async function saveBill(event) {
      event.preventDefault();

      if (!currentGroupName) {
        setStatus(billStatus, "請先在上方輸入群組名稱並進入。", "error");
        return;
      }

      const payload = {
        item_name: itemNameInput.value.trim(),
        amount: Number(amountInput.value),
        payer: payerInput.value.trim(),
        group_name: currentGroupName,
        weight: Number(billWeightInput.value),
      };

      if (!payload.item_name || !payload.payer || Number.isNaN(payload.amount) || Number.isNaN(payload.weight)) {
        setStatus(billStatus, "請完整填寫預支資料。", "error");
        return;
      }

      if (payload.weight <= 0) {
        setStatus(billStatus, "人數必須大於 0。", "error");
        return;
      }

      const result = billIdInput.value
        ? await supabaseClient.from(BILLS_TABLE).update(payload).eq("id", billIdInput.value)
        : await supabaseClient.from(BILLS_TABLE).insert([payload]);

      if (result.error) {
        setStatus(billStatus, getErrorMessage(result.error, "儲存失敗"), "error");
        return;
      }

      setStatus(billStatus, billIdInput.value ? "已更新。" : "已新增。", "success");
      resetBillForm();
      await loadGroupOptions();
      await loadGroupData({ preserveBillStatus: true });
    }

    async function saveMember(event) {
      event.preventDefault();

      if (!currentGroupName) {
        setStatus(memberStatus, "請先在上方輸入群組名稱並進入。", "error");
        return;
      }

      const payload = {
        member_name: memberNameInput.value.trim(),
        weight: Number(weightInput.value),
        group_name: currentGroupName,
      };

      if (!payload.member_name || Number.isNaN(payload.weight)) {
        setStatus(memberStatus, "請完整填寫成員資料。", "error");
        return;
      }

      if (payload.weight <= 0) {
        setStatus(memberStatus, "人數必須大於 0。", "error");
        return;
      }

      const result = memberIdInput.value
        ? await supabaseClient.from(MEMBERS_TABLE).update(payload).eq("id", memberIdInput.value)
        : await supabaseClient.from(MEMBERS_TABLE).insert([payload]);

      if (result.error) {
        setStatus(memberStatus, getErrorMessage(result.error, "儲存失敗"), "error");
        return;
      }

      setStatus(memberStatus, memberIdInput.value ? "已更新。" : "已新增。", "success");
      resetMemberForm();
      await loadGroupOptions();
      await loadGroupData({ preserveMemberStatus: true });
    }

    async function copyCurrentUrl() {
      const url = window.location.href;

      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(url);
        } else {
          const temp = document.createElement("textarea");
          temp.value = url;
          temp.style.position = "fixed";
          temp.style.opacity = "0";
          document.body.appendChild(temp);
          temp.focus();
          temp.select();
          document.execCommand("copy");
          document.body.removeChild(temp);
        }
        groupHint.textContent = "目前網址已複製。";
      } catch (error) {
        groupHint.textContent = "複製失敗，請手動複製網址。";
      }
    }

    window.startBillEdit = function startBillEdit(id) {
      const bill = currentBills.find((item) => String(item.id) === String(id));
      if (!bill) {
        setStatus(billStatus, "找不到這筆資料。", "error");
        return;
      }

      billIdInput.value = bill.id;
      itemNameInput.value = bill.item_name || "";
      amountInput.value = bill.amount ?? "";
      payerInput.value = bill.payer || "";
      billWeightInput.value = bill.weight ?? 1;
      billFormTitle.textContent = "修改預支";
      billSubmitBtn.textContent = "更新";
      setBillEditMode(true);
      setStatus(billStatus, "正在編輯。", "success");
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    window.startMemberEdit = function startMemberEdit(id) {
      const member = currentMembers.find((item) => String(item.id) === String(id));
      if (!member) {
        setStatus(memberStatus, "找不到這筆資料。", "error");
        return;
      }

      memberIdInput.value = member.id;
      memberNameInput.value = member.member_name || "";
      weightInput.value = member.weight ?? 1;
      memberFormTitle.textContent = "修改成員";
      memberSubmitBtn.textContent = "更新";
      setBillEditMode(false);
      setStatus(memberStatus, "正在編輯。", "success");
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    groupForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const groupName = groupInput.value.trim();
      if (!groupName) {
        groupHint.textContent = "請先輸入群組名稱。";
        return;
      }
      window.location.href = buildGroupUrl(groupName);
    });

    groupSelect.addEventListener("change", () => {
      const groupName = groupSelect.value.trim();
      if (!groupName) {
        return;
      }
      groupInput.value = groupName;
      window.location.href = buildGroupUrl(groupName);
    });

    copyUrlBtn.addEventListener("click", copyCurrentUrl);
    resetBtn.addEventListener("click", () => {
      window.location.href = "index.html";
    });
    billForm.addEventListener("submit", saveBill);
    memberForm.addEventListener("submit", saveMember);
    billCancelBtn.addEventListener("click", resetBillForm);
    memberCancelBtn.addEventListener("click", resetMemberForm);
    printBtn.addEventListener("click", () => window.print());

    async function init() {
      currentGroupName = getGroupNameFromUrl();
      groupInput.value = currentGroupName;
      updateGroupHeader(currentGroupName);
      resetBillForm();
      resetMemberForm();
      await loadGroupOptions();

      if (currentGroupName) {
        groupSelect.value = currentGroupName;
        loadGroupData();
      } else {
        renderWelcomeState();
      }
    }

    init();
  </script>
</body>
</html>
