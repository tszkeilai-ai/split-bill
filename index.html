<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>分單計數機</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --line: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #0f766e;
      --danger: #dc2626;
      --shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 20px 16px 48px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      margin-bottom: 16px;
      padding: 14px;
      background: rgba(246, 247, 251, 0.92);
      backdrop-filter: blur(10px);
    }

    .topbar-inner {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      box-shadow: var(--shadow);
    }

    .group-input {
      flex: 1 1 280px;
      min-width: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
    }

    .card {
      grid-column: span 12;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .span-6 {
      grid-column: span 12;
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 1rem;
      font-weight: 700;
    }

    .section-subtitle {
      margin: -4px 0 14px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      background: #fbfcfe;
    }

    .stat small {
      display: block;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat strong {
      display: block;
      font-size: 1.4rem;
      letter-spacing: 0.02em;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--muted);
    }

    input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      font-size: 1rem;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-secondary {
      background: #eff6ff;
      color: var(--primary);
    }

    .btn-light {
      background: #f3f4f6;
      color: var(--text);
    }

    .btn-warning {
      background: #fff7ed;
      color: #b45309;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .status {
      min-height: 24px;
      margin-top: 12px;
      font-size: 0.92rem;
      font-weight: 600;
    }

    .status.success {
      color: var(--success);
    }

    .status.error {
      color: var(--danger);
    }

    .quiet {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .empty {
      padding: 20px;
      border: 1px dashed var(--line);
      border-radius: 14px;
      background: #fcfcfd;
      color: var(--muted);
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
    }

    td.number {
      font-variant-numeric: tabular-nums;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .current-group {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .print-area {
      display: flex;
      justify-content: flex-end;
      margin-top: 16px;
    }

    @media (min-width: 900px) {
      .span-6 {
        grid-column: span 6;
      }
    }

    @media print {
      .no-print {
        display: none !important;
      }

      body {
        background: #fff;
      }

      .topbar {
        position: static;
        padding: 0;
      }

      .topbar-inner,
      .card {
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar no-print">
      <form id="groupForm" class="topbar-inner">
        <div class="group-input">
          <label for="groupInput">群組名稱</label>
          <input id="groupInput" type="text" placeholder="輸入群組後按 Enter 或點擊進入" />
        </div>
        <button type="submit" class="btn-primary">進入</button>
        <button type="button" class="btn-secondary" id="copyUrlBtn">複製目前網址</button>
      </form>
    </div>

    <div class="grid">
      <section class="card">
        <div class="toolbar">
          <div class="current-group" id="currentGroupLabel">未選擇群組</div>
          <div class="quiet" id="groupHint">輸入群組名稱後即可進入。</div>
        </div>

        <div class="stats">
          <div class="stat">
            <small>總金額</small>
            <strong id="totalAmount">0.00</strong>
          </div>
          <div class="stat">
            <small>總權重</small>
            <strong id="totalWeight">0.00</strong>
          </div>
          <div class="stat">
            <small>每單位</small>
            <strong id="unitAmount">0.00</strong>
          </div>
        </div>

        <div id="memberSummary"></div>

        <div class="print-area no-print">
          <button type="button" class="btn-light" id="printBtn">導出 PDF</button>
        </div>
      </section>

      <section class="card span-6 no-print">
        <h2 class="section-title" id="billFormTitle">新增消費</h2>
        <p class="section-subtitle">目前群組會自動帶入，不需重複輸入。</p>
        <form id="billForm">
          <input type="hidden" id="billId" />
          <div class="form-grid">
            <div>
              <label for="itemName">項目</label>
              <input id="itemName" type="text" placeholder="晚餐、飲料、交通" required />
            </div>
            <div>
              <label for="amount">金額</label>
              <input id="amount" type="number" min="0" step="0.01" placeholder="0.00" required />
            </div>
            <div>
              <label for="payerName">付款人</label>
              <input id="payerName" type="text" placeholder="小明" required />
            </div>
          </div>
          <div class="actions">
            <button type="submit" class="btn-primary" id="billSubmitBtn">儲存</button>
            <button type="button" class="btn-light" id="billCancelBtn">清空</button>
          </div>
          <div id="billStatus" class="status"></div>
        </form>
      </section>

      <section class="card span-6 no-print">
        <h2 class="section-title" id="memberFormTitle">新增成員</h2>
        <p class="section-subtitle">沒有付款的人也能加入分帳。</p>
        <form id="memberForm">
          <input type="hidden" id="memberId" />
          <div class="form-grid">
            <div>
              <label for="memberName">姓名</label>
              <input id="memberName" type="text" placeholder="小明、小華、小孩" required />
            </div>
            <div>
              <label for="weight">權重</label>
              <input id="weight" type="number" min="0.01" step="0.01" value="1" required />
            </div>
          </div>
          <div class="actions">
            <button type="submit" class="btn-primary" id="memberSubmitBtn">儲存</button>
            <button type="button" class="btn-light" id="memberCancelBtn">清空</button>
          </div>
          <div id="memberStatus" class="status"></div>
        </form>
      </section>

      <section class="card">
        <h2 class="section-title">消費</h2>
        <div id="billList"></div>
      </section>

      <section class="card">
        <h2 class="section-title">成員</h2>
        <div id="memberList"></div>
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://zryatuqohbicnxcasqzl.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_SvaZt60lD68VdZaZbYbMFA_NpSO4Bgh";
    const BILLS_TABLE = "bills";
    const MEMBERS_TABLE = "members";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const groupForm = document.getElementById("groupForm");
    const groupInput = document.getElementById("groupInput");
    const copyUrlBtn = document.getElementById("copyUrlBtn");
    const currentGroupLabel = document.getElementById("currentGroupLabel");
    const groupHint = document.getElementById("groupHint");

    const totalAmountEl = document.getElementById("totalAmount");
    const totalWeightEl = document.getElementById("totalWeight");
    const unitAmountEl = document.getElementById("unitAmount");
    const memberSummaryEl = document.getElementById("memberSummary");
    const billListEl = document.getElementById("billList");
    const memberListEl = document.getElementById("memberList");
    const printBtn = document.getElementById("printBtn");

    const billForm = document.getElementById("billForm");
    const billIdInput = document.getElementById("billId");
    const itemNameInput = document.getElementById("itemName");
    const amountInput = document.getElementById("amount");
    const payerNameInput = document.getElementById("payerName");
    const billFormTitle = document.getElementById("billFormTitle");
    const billSubmitBtn = document.getElementById("billSubmitBtn");
    const billCancelBtn = document.getElementById("billCancelBtn");
    const billStatus = document.getElementById("billStatus");

    const memberForm = document.getElementById("memberForm");
    const memberIdInput = document.getElementById("memberId");
    const memberNameInput = document.getElementById("memberName");
    const weightInput = document.getElementById("weight");
    const memberFormTitle = document.getElementById("memberFormTitle");
    const memberSubmitBtn = document.getElementById("memberSubmitBtn");
    const memberCancelBtn = document.getElementById("memberCancelBtn");
    const memberStatus = document.getElementById("memberStatus");

    let currentGroupName = "";
    let currentBills = [];
    let currentMembers = [];

    function formatNumber(value) {
      const number = Number(value || 0);
      return Number.isFinite(number) ? number.toFixed(2) : "0.00";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function setStatus(element, message, type = "success") {
      element.textContent = message;
      element.className = "status " + type;
    }

    function clearStatus(element) {
      element.textContent = "";
      element.className = "status";
    }

    function getGroupNameFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return (params.get("group_name") || "").trim();
    }

    function buildGroupUrl(groupName) {
      const clean = groupName.trim();
      if (!clean) {
        return "index.html";
      }
      return `index.html?group_name=${encodeURIComponent(clean)}`;
    }

    function updateGroupHeader(groupName) {
      currentGroupLabel.textContent = groupName || "未選擇群組";
      if (!groupName) {
        groupHint.textContent = "輸入群組名稱後即可進入。";
        return;
      }
      groupHint.textContent = "載入後會自動查詢，不需要再手動點擊。";
    }

    function resetBillForm() {
      billIdInput.value = "";
      itemNameInput.value = "";
      amountInput.value = "";
      payerNameInput.value = "";
      billFormTitle.textContent = "新增消費";
      billSubmitBtn.textContent = "儲存";
      clearStatus(billStatus);
    }

    function resetMemberForm() {
      memberIdInput.value = "";
      memberNameInput.value = "";
      weightInput.value = "1";
      memberFormTitle.textContent = "新增成員";
      memberSubmitBtn.textContent = "儲存";
      clearStatus(memberStatus);
    }

    function renderWelcomeState() {
      totalAmountEl.textContent = "0.00";
      totalWeightEl.textContent = "0.00";
      unitAmountEl.textContent = "0.00";
      memberSummaryEl.innerHTML = '<div class="empty">輸入群組名稱並進入後，這裡會顯示分帳結果。</div>';
      billListEl.innerHTML = '<div class="empty">尚未選擇群組。</div>';
      memberListEl.innerHTML = '<div class="empty">尚未選擇群組。</div>';
    }

    function renderSummary(bills, members) {
      const totalAmount = bills.reduce((sum, bill) => sum + Number(bill.amount || 0), 0);
      const totalWeight = members.reduce((sum, member) => sum + Number(member.weight || 0), 0);
      const unitAmount = totalWeight > 0 ? totalAmount / totalWeight : 0;

      totalAmountEl.textContent = formatNumber(totalAmount);
      totalWeightEl.textContent = formatNumber(totalWeight);
      unitAmountEl.textContent = formatNumber(unitAmount);

      if (!currentGroupName) {
        memberSummaryEl.innerHTML = '<div class="empty">請先輸入群組名稱。</div>';
        return;
      }

      if (!members.length) {
        memberSummaryEl.innerHTML = '<div class="empty">這個群組目前沒有成員資料，先新增成員後就能計算。</div>';
        return;
      }

      const rows = members
        .slice()
        .sort((a, b) => (a.member_name || "").localeCompare(b.member_name || "", "zh-Hant"))
        .map((member) => {
          const weight = Number(member.weight || 0);
          const shouldPay = unitAmount * weight;
          return `
            <tr>
              <td>${escapeHtml(member.member_name || "")}</td>
              <td class="number">${formatNumber(weight)}</td>
              <td class="number">${formatNumber(shouldPay)}</td>
            </tr>
          `;
        })
        .join("");

      memberSummaryEl.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>姓名</th>
              <th>權重</th>
              <th>應付</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function renderBills(bills) {
      if (!currentGroupName) {
        billListEl.innerHTML = '<div class="empty">請先輸入群組名稱。</div>';
        return;
      }

      if (!bills.length) {
        billListEl.innerHTML = '<div class="empty">這個群組目前沒有消費資料。</div>';
        return;
      }

      const rows = bills
        .map((bill) => `
          <tr>
            <td>${escapeHtml(bill.item_name || "")}</td>
            <td>${escapeHtml(bill.payer_name || "")}</td>
            <td class="number">${formatNumber(bill.amount)}</td>
            <td class="no-print">
              <button type="button" class="btn-warning" onclick="startBillEdit(${bill.id})">修改</button>
            </td>
          </tr>
        `)
        .join("");

      billListEl.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>項目</th>
              <th>付款人</th>
              <th>金額</th>
              <th class="no-print">操作</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function renderMembers(members) {
      if (!currentGroupName) {
        memberListEl.innerHTML = '<div class="empty">請先輸入群組名稱。</div>';
        return;
      }

      if (!members.length) {
        memberListEl.innerHTML = '<div class="empty">這個群組目前沒有成員資料。</div>';
        return;
      }

      const rows = members
        .map((member) => `
          <tr>
            <td>${escapeHtml(member.member_name || "")}</td>
            <td class="number">${formatNumber(member.weight)}</td>
            <td class="no-print">
              <button type="button" class="btn-warning" onclick="startMemberEdit(${member.id})">修改</button>
            </td>
          </tr>
        `)
        .join("");

      memberListEl.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>姓名</th>
              <th>權重</th>
              <th class="no-print">操作</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    async function loadGroupData(options = {}) {
      const { preserveBillStatus = false, preserveMemberStatus = false } = options;

      if (!currentGroupName) {
        renderWelcomeState();
        return;
      }

      updateGroupHeader(currentGroupName);
      groupInput.value = currentGroupName;

      const [billsResult, membersResult] = await Promise.all([
        supabaseClient
          .from(BILLS_TABLE)
          .select("*")
          .eq("group_name", currentGroupName)
          .order("created_at", { ascending: false }),
        supabaseClient
          .from(MEMBERS_TABLE)
          .select("*")
          .eq("group_name", currentGroupName)
          .order("created_at", { ascending: false }),
      ]);

      if (billsResult.error) {
        currentBills = [];
        setStatus(billStatus, "讀取消費資料失敗：" + billsResult.error.message, "error");
      } else {
        currentBills = billsResult.data || [];
        if (!preserveBillStatus) {
          clearStatus(billStatus);
        }
      }

      if (membersResult.error) {
        currentMembers = [];
        setStatus(memberStatus, "讀取成員資料失敗：" + membersResult.error.message, "error");
      } else {
        currentMembers = membersResult.data || [];
        if (!preserveMemberStatus) {
          clearStatus(memberStatus);
        }
      }

      renderSummary(currentBills, currentMembers);
      renderBills(currentBills);
      renderMembers(currentMembers);

      if (!currentBills.length && !currentMembers.length) {
        groupHint.textContent = "查詢完成，這個群組目前還沒有任何資料。";
      }
    }

    async function saveBill(event) {
      event.preventDefault();

      if (!currentGroupName) {
        setStatus(billStatus, "請先在上方輸入群組名稱並進入。", "error");
        return;
      }

      const payload = {
        item_name: itemNameInput.value.trim(),
        amount: Number(amountInput.value),
        payer_name: payerNameInput.value.trim(),
        group_name: currentGroupName,
      };

      if (!payload.item_name || !payload.payer_name || Number.isNaN(payload.amount)) {
        setStatus(billStatus, "請完整填寫消費資料。", "error");
        return;
      }

      const result = billIdInput.value
        ? await supabaseClient.from(BILLS_TABLE).update(payload).eq("id", billIdInput.value)
        : await supabaseClient.from(BILLS_TABLE).insert([payload]);

      if (result.error) {
        setStatus(billStatus, "儲存失敗：" + result.error.message, "error");
        return;
      }

      setStatus(billStatus, billIdInput.value ? "已更新。" : "已新增。", "success");
      resetBillForm();
      await loadGroupData({ preserveBillStatus: true });
    }

    async function saveMember(event) {
      event.preventDefault();

      if (!currentGroupName) {
        setStatus(memberStatus, "請先在上方輸入群組名稱並進入。", "error");
        return;
      }

      const payload = {
        member_name: memberNameInput.value.trim(),
        weight: Number(weightInput.value),
        group_name: currentGroupName,
      };

      if (!payload.member_name || Number.isNaN(payload.weight)) {
        setStatus(memberStatus, "請完整填寫成員資料。", "error");
        return;
      }

      if (payload.weight <= 0) {
        setStatus(memberStatus, "權重必須大於 0。", "error");
        return;
      }

      const result = memberIdInput.value
        ? await supabaseClient.from(MEMBERS_TABLE).update(payload).eq("id", memberIdInput.value)
        : await supabaseClient.from(MEMBERS_TABLE).insert([payload]);

      if (result.error) {
        setStatus(memberStatus, "儲存失敗：" + result.error.message, "error");
        return;
      }

      setStatus(memberStatus, memberIdInput.value ? "已更新。" : "已新增。", "success");
      resetMemberForm();
      await loadGroupData({ preserveMemberStatus: true });
    }

    async function copyCurrentUrl() {
      const url = window.location.href;

      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(url);
        } else {
          const temp = document.createElement("textarea");
          temp.value = url;
          temp.style.position = "fixed";
          temp.style.opacity = "0";
          document.body.appendChild(temp);
          temp.focus();
          temp.select();
          document.execCommand("copy");
          document.body.removeChild(temp);
        }
        groupHint.textContent = "目前網址已複製。";
      } catch (error) {
        groupHint.textContent = "複製失敗，請手動複製網址。";
      }
    }

    window.startBillEdit = function startBillEdit(id) {
      const bill = currentBills.find((item) => String(item.id) === String(id));
      if (!bill) {
        setStatus(billStatus, "找不到這筆資料。", "error");
        return;
      }

      billIdInput.value = bill.id;
      itemNameInput.value = bill.item_name || "";
      amountInput.value = bill.amount ?? "";
      payerNameInput.value = bill.payer_name || "";
      billFormTitle.textContent = "修改消費";
      billSubmitBtn.textContent = "更新";
      setStatus(billStatus, "正在編輯。", "success");
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    window.startMemberEdit = function startMemberEdit(id) {
      const member = currentMembers.find((item) => String(item.id) === String(id));
      if (!member) {
        setStatus(memberStatus, "找不到這筆資料。", "error");
        return;
      }

      memberIdInput.value = member.id;
      memberNameInput.value = member.member_name || "";
      weightInput.value = member.weight ?? 1;
      memberFormTitle.textContent = "修改成員";
      memberSubmitBtn.textContent = "更新";
      setStatus(memberStatus, "正在編輯。", "success");
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    groupForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const groupName = groupInput.value.trim();
      if (!groupName) {
        groupHint.textContent = "請先輸入群組名稱。";
        return;
      }
      window.location.href = buildGroupUrl(groupName);
    });

    copyUrlBtn.addEventListener("click", copyCurrentUrl);
    billForm.addEventListener("submit", saveBill);
    memberForm.addEventListener("submit", saveMember);
    billCancelBtn.addEventListener("click", resetBillForm);
    memberCancelBtn.addEventListener("click", resetMemberForm);
    printBtn.addEventListener("click", () => window.print());

    function init() {
      currentGroupName = getGroupNameFromUrl();
      groupInput.value = currentGroupName;
      updateGroupHeader(currentGroupName);
      resetBillForm();
      resetMemberForm();

      if (currentGroupName) {
        loadGroupData();
      } else {
        renderWelcomeState();
      }
    }

    init();
  </script>
</body>
</html>
